name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Smoke Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: campuspark
          POSTGRES_PASSWORD: campuspark
          POSTGRES_DB: campuspark_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U campuspark"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://campuspark:campuspark@localhost:5432/campuspark_test
      NODE_ENV: test
      PORT: 3000
      LOG_LEVEL: warn

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to test DB
        run: npx prisma db push --force-reset

      - name: Seed test database
        run: node prisma/seed.js

      # ── Syntax check: Node can parse all server-side JS files ─────────────
      - name: Syntax check (server.js)
        run: node --check server.js

      - name: Syntax check (app.js)
        run: node --check app.js

      # ── Smoke test: server starts and /api/spots returns 200 ──────────────
      - name: Start server (background)
        run: node server.js &
        env:
          DATABASE_URL: postgresql://campuspark:campuspark@localhost:5432/campuspark_test

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000/api/spots && break
            echo "Waiting... ($i)"
            sleep 1
          done

      - name: Smoke — GET /api/spots returns 200
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/spots)
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] || (echo "Expected 200, got $STATUS" && exit 1)

      - name: Smoke — POST /api/auth/register works
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:3000/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"name":"ci_smoke_user","password":"CIPass123!"}')
          echo "Register status: $STATUS"
          [ "$STATUS" = "201" ] || [ "$STATUS" = "409" ] || (echo "Unexpected: $STATUS" && exit 1)

      - name: Smoke — POST /api/auth/login returns token
        run: |
          RESP=$(curl -s -X POST http://localhost:3000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"name":"ci_smoke_user","password":"CIPass123!"}')
          echo "Login response: $RESP"
          echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'token' in d, f'No token: {d}'"

      - name: Concurrency load test (race condition guard)
        run: node scripts/load-test-reserve.js
        env:
          DATABASE_URL: postgresql://campuspark:campuspark@localhost:5432/campuspark_test
